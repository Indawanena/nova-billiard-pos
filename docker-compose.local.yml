# Docker Compose for local PostgreSQL (Standalone mode)
services:
  # PostgreSQL database for standalone deployment
  postgres:
    image: postgres:15
    container_name: nova-billiard-pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nova_billiard_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - nova-billiard-pos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nova_billiard_pos"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nova-billiard-pos-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-operator@nova-billiard.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?Set PGADMIN_DEFAULT_PASSWORD before starting pgAdmin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - nova-billiard-pos-network
    depends_on:
      postgres:
        condition: service_healthy

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: nova-billiard-pos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nova-billiard-pos-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    name: nova_billiard_pos_postgres_data
  pgadmin_data:
    name: nova_billiard_pos_pgadmin_data
  redis_data:
    name: nova_billiard_pos_redis_data

networks:
  nova-billiard-pos-network:
    name: nova-billiard-pos-network
    driver: bridge
